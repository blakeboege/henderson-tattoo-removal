<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Henderson Tattoo Removal — Safe, evidence-based laser tattoo removal in Henderson, NV</title>
  <link rel="stylesheet" href="styles/colors_and_type.css">
  <link rel="icon" href="assets/logomark.svg">
  <style>
    html, body { background: #000; margin: 0; padding: 0; }
    #root { overflow-x: hidden; background: #f5f5f7; }
    button:focus-visible, a:focus-visible { outline: 2px solid #0071e3; outline-offset: 2px; }
    button:active { transform: scale(0.98); }
    input:focus, select:focus, textarea:focus { border-color: rgba(0,113,227,0.5) !important; }
    @keyframes ec-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ec-pop { from { opacity: 0; transform: translateY(12px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/Shell.jsx"></script>
  <script type="text/babel" src="components/BookingModal.jsx"></script>
  <script type="text/babel" src="components/HomeHero.jsx"></script>
  <script type="text/babel" src="components/HomePage.jsx"></script>
  <script type="text/babel" src="components/ServicesPage.jsx"></script>
  <script type="text/babel" src="components/ResultsPage.jsx"></script>
  <script type="text/babel" src="components/AboutPage.jsx"></script>
  <script type="text/babel" src="components/ContactPage.jsx"></script>
  <script type="text/babel" src="components/EmailCapture.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const route = useRoute();
      const [booking, setBooking] = useState(false);
      const openBook = () => setBooking(true);

      // Support the "#book" sigil anywhere (from CTAs inside content)
      useEffect(() => {
        const handler = (e) => {
          const a = e.target.closest('a');
          if (a && a.getAttribute('href') === '#book') {
            e.preventDefault();
            openBook();
          }
        };
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, []);

      let Page = HomePage;
      if (route.startsWith('#/services')) Page = ServicesPage;
      else if (route.startsWith('#/results')) Page = ResultsPage;
      else if (route.startsWith('#/about')) Page = AboutPage;
      else if (route.startsWith('#/contact')) Page = ContactPage;

      return (
        <div data-screen-label="Henderson Tattoo Removal">
          <Nav onBook={openBook}/>
          <main>
            <Page onBook={openBook}/>
          </main>
          <Footer/>
          <BookingModal open={booking} onClose={() => setBooking(false)}/>
          <EmailCapturePopup/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
